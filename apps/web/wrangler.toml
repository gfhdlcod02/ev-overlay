name = "ev-overlay-web"

# ============================================
# Cloudflare Pages Configuration
# ============================================

[build]
command = "pnpm build"
directory = "dist"

# ============================================
# Environment Variables (non-secret)
# ============================================
[vars]
VITE_APP_NAME = "EV Overlay"
VITE_APP_VERSION = "1.2.0"

# ============================================
# Environment-specific Configuration
# ============================================
[env.staging]
name = "ev-overlay-web-staging"
[env.staging.vars]
VITE_API_URL = "https://ev-overlay-api-staging.your-subdomain.workers.dev/api"
VITE_ENVIRONMENT = "staging"

[env.production]
name = "ev-overlay-web"
[env.production.vars]
VITE_API_URL = "https://ev-overlay-api.your-subdomain.workers.dev/api"
VITE_ENVIRONMENT = "production"

# ============================================
# Headers (Performance & Security)
# ============================================
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://*.tile.thunderforest.com; connect-src 'self' https://*.workers.dev https://api.openchargemap.io;"

# Cache static assets
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Cache index.html with shorter TTL for updates
[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=300, must-revalidate"

# ============================================
# Redirects
# ============================================
[[redirects]]
from = "/api/*"
to = "https://ev-overlay-api.your-subdomain.workers.dev/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
