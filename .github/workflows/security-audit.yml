name: Weekly Security Audit

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run full security audit
        run: |
          pnpm audit --json > full-audit.json || true
          echo "Audit completed"

      - name: Generate report
        id: report
        run: |
          critical=$(cat full-audit.json | jq '[.advisories[] | select(.severity == "critical")] | length')
          high=$(cat full-audit.json | jq '[.advisories[] | select(.severity == "high")] | length')
          moderate=$(cat full-audit.json | jq '[.advisories[] | select(.severity == "moderate")] | length')
          low=$(cat full-audit.json | jq '[.advisories[] | select(.severity == "low")] | length')

          echo "VULNERABILITY_SUMMARY<<EOF" >> $GITHUB_OUTPUT
          echo "## Security Audit Results" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "| Severity | Count |" >> $GITHUB_OUTPUT
          echo "|----------|-------|" >> $GITHUB_OUTPUT
          echo "| Critical | $critical |" >> $GITHUB_OUTPUT
          echo "| High | $high |" >> $GITHUB_OUTPUT
          echo "| Moderate | $moderate |" >> $GITHUB_OUTPUT
          echo "| Low | $low |" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT

          if [ "$critical" -gt 0 ] || [ "$high" -gt 0 ]; then
            echo "⚠️ **Action Required**: Found $critical critical and $high high severity vulnerabilities" >> $GITHUB_OUTPUT
            echo "needs_attention=true" >> $GITHUB_OUTPUT
          else
            echo "✅ No critical or high severity vulnerabilities found" >> $GITHUB_OUTPUT
            echo "needs_attention=false" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create issue if vulnerabilities found
        if: steps.report.outputs.needs_attention == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.report.outputs.VULNERABILITY_SUMMARY }}`;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Security Audit: Vulnerabilities Found - ${new Date().toISOString().split('T')[0]}`,
              body: summary + `

## Next Steps
1. Review the detailed audit report in Actions artifacts
2. Update vulnerable dependencies
3. Run tests to ensure compatibility
4. Deploy security patch

[View Workflow Run](${context.payload.repository.html_url}/actions/runs/${context.runId})
`,
              labels: ['security', 'dependencies', 'automated']
            });
            console.log(`Created issue #${issue.data.number}`);

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-security-audit
          path: full-audit.json
