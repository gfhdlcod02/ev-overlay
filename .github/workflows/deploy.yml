name: Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test

      - name: Run lint
        run: pnpm run lint

  deploy-worker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Sync versions
        run: pnpm version:sync

      - name: Build core
        run: pnpm --filter @ev/core build

      - name: Inject version into worker source
        run: node scripts/inject-version-worker.js
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/api
          wranglerVersion: "4.69.0"
          command: deploy

  deploy-web:
    needs: deploy-worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build core
        run: pnpm --filter @ev/core build

      - name: Create .env.production
        run: |
          echo "VITE_API_URL=${{ vars.API_URL }}" > apps/web/.env.production
          echo "VITE_APP_VERSION=${{ github.ref_name }}" >> apps/web/.env.production
          cat apps/web/.env.production

      - name: Build Web App
        run: pnpm --filter @ev/web build

      - name: Check built output
        run: |
          echo "Checking built JS for API URL:"
          grep -oE 'const [a-z]+="[^"]*api[^"]*"' apps/web/dist/assets/index-*.js | head -3 || echo "Pattern not found"
          grep -oE '/api/route|https://.*workers.dev/api' apps/web/dist/assets/index-*.js | head -3 || echo "API pattern not found"

      - name: Inject version into builds
        run: pnpm version:inject
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Install Wrangler
        run: pnpm add -g wrangler@4.69.0

      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.69.0"
          command: pages deploy apps/web/dist --project-name=ev-overlay
