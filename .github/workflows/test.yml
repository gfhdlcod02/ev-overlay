name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test

      - name: Run lint
        run: pnpm run lint

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: false

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run security audit
        run: |
          echo "Running npm audit for vulnerabilities..."
          pnpm audit --json --audit-level=moderate > audit-report.json || true
          cat audit-report.json

      - name: Check for high/critical vulnerabilities
        run: |
          high_count=$(cat audit-report.json | jq '[.advisories[] | select(.severity == "high" or .severity == "critical")] | length')
          if [ "$high_count" -gt 0 ]; then
            echo "❌ Found $high_count high/critical vulnerabilities"
            exit 1
          fi
          echo "✅ No high or critical vulnerabilities found"

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit-report
          path: audit-report.json

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build core package
        run: pnpm --filter @ev/core build

      - name: Build web app
        run: pnpm --filter @ev/web build
        env:
          VITE_API_URL: ${{ vars.API_URL || 'http://localhost:8787/api' }}
